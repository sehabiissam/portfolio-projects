<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles.css">
  <title>Todo App</title>
</head>

<body>
  <div class="todo-app">
    <div class="progress-bar">
      <div class="left">
        <h1>Todo App</h1>
        <p>Kepp it up !</p>
        <div class="full-progress">
          <div class="progress"></div>
        </div>
      </div>
      <div class="right">
        <p>
          <span>1</span> / <span>2</span>
        </p>
      </div>
    </div>
    <div class="input-section">
      <form action="">
        <input type="text" class="task-input js-task-input">
        <button class="add-button"><i class="fa-solid fa-plus"></i></button>
      </form>
    </div>
    <div class="tasks-section">
      <div class="task">
        <div class="left">
          <input type="checkbox">
          <p>issam</p>
        </div>
        <div class="right">
          <button class="edit-button"><img src="img/edit.png" alt=""></button>
          <button class="delete-button"><img src="img/bin.png" alt=""></button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
